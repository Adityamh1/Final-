name: Build Android APK and AAB

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  build:
    name: Build Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node Dependencies
        run: npm ci

      - name: Build Web Application
        run: npm run build

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Sync Capacitor Native Project
        run: npx cap sync

      - name: Set executable permissions for Gradle Wrapper
        run: chmod +x android/gradlew

      - name: Build Android Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Build Android Debug AAB
        run: |
          cd android
          ./gradlew bundleDebug

      - name: Build Android Release AAB (Unsigned)
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: PashuBazaar-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Debug AAB
        uses: actions/upload-artifact@v4
        with:
          name: PashuBazaar-Debug-AAB
          path: android/app/build/outputs/bundle/debug/app-debug.aab

      - name: Upload Release AAB (Unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: PashuBazaar-Release-AAB-Unsigned
          path: android/app/build/outputs/bundle/release/app-release-aab.aab
